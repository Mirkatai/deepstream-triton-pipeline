version: "3.9"

# ============================================================
# DeepStream 8.0 + Triton 25.03 — Full Stack
# Blackwell / Hopper / Ada / Ampere / Turing dGPU (x86)
#
# NVIDIA Driver >= 570.133.20 required
# Run: docker-compose up --build
# ============================================================

services:

  # ---- Triton Inference Server ----
  triton:
    image: nvcr.io/nvidia/tritonserver:25.03-py3
    # Why 25.03?
    #   - Officially paired with DeepStream 8.0 on x86
    #   - CUDA 12.8 — full Blackwell SM_100 support
    #   - TensorRT 10.9 — Blackwell optimized kernels
    #   - Python backend stable, sequence batcher mature
    #   - CuPy cuda12x compatible
    container_name: triton
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=0
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,video
    ports:
      - "8000:8000"   # HTTP
      - "8001:8001"   # gRPC  ← used by pipeline
      - "8002:8002"   # Prometheus metrics
    volumes:
      - ./triton_model:/models
      - triton_cache:/opt/tritonserver/caches
    command: >
      tritonserver
        --model-repository=/models
        --backend-config=python,shm-region-prefix-name=triton_
        --backend-config=python,shm-default-byte-size=16777216
        --model-control-mode=poll
        --repository-poll-secs=30
        --grpc-max-message-size=268435456
        --log-verbose=0
        --metrics-interval-ms=2000
    shm_size: "2gb"
    ulimits:
      memlock: -1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v2/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 45s

  # ---- DeepStream Pipeline ----
  deepstream:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: deepstream_pipeline
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=0
      # DS 8.0 requires explicit video capability for nvv4l2decoder/encoder
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,video,display
      - DISPLAY=${DISPLAY:-:0}
      - TRITON_URL=triton:8001
    network_mode: host          # needed for RTSP server reachability
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ./videos:/data/videos:ro     # mount local MP4 files here
      - ./configs:/app/configs:ro
    depends_on:
      triton:
        condition: service_healthy
    restart: unless-stopped
    command: >
      python3 main.py
        --sources rtsp://192.168.1.100:554/stream1 /data/videos/test1.mp4
        --triton-url triton:8001
        --output-port 8554
    cap_add:
      - SYS_PTRACE      # needed by pynvml for GPU monitoring

volumes:
  triton_cache:
